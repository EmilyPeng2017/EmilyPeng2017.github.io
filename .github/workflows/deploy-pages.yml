name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove non-site folders
        run: |
          rm -rf .git
          rm -rf .github
          rm -rf node_modules
          rm -rf public
          rm -rf source
          rm -rf scaffolds
          rm -rf themes
          rm -f package.json
          rm -f package_lock.json
          rm -f _config.yml
          rm -f _config.icarus.yml
          rm -f _config.landscape.yml
          rm -f db.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
