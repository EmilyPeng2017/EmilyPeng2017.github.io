<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新年快乐！ - Sai (Emily) Peng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Fira+Sans:wght@400;500;700;800&family=Source+Code+Pro:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* ---------- GLOBAL STYLES (matching blogs/publications) ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fafaf9;
      color: #1c1e21;
      font-family: 'Lato', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      line-height: 1.5;
    }

    /* TOPBAR — black background with white text */
    .topbar {
      background: #000000;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }

    .brand {
      font-family: 'Fira Sans', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.3px;
      color: #ffffff;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .brand:hover {
      opacity: 0.8;
      color: #dddddd;
    }

    .nav-links {
      display: flex;
      gap: 1.8rem;
      flex-wrap: wrap;
    }
    .nav-links a {
      font-family: 'Lato', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: #f0f0f0;
      text-decoration: none;
      padding: 0.25rem 0;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s, color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active {
      border-bottom-color: #ffffff;
      color: #ffffff;
    }

    /* MAIN LAYOUT */
    .layout {
      max-width: 800px;
      margin: 2rem auto 4rem;
      padding: 0 2rem;
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* card styling */
    .card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.03);
      padding: 2rem;
      border: 1px solid #edeff2;
      transition: box-shadow 0.2s;
    }

    .kicker {
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      font-weight: 700;
      color: #1f6e8c;
      margin-bottom: 0.5rem;
    }

    .post-title {
      font-family: 'Fira Sans', sans-serif;
      font-weight: 800;
      font-size: 2.5rem;
      letter-spacing: -1px;
      line-height: 1.2;
      color: #0f2c3b;
      margin-bottom: 1rem;
    }

    .post-meta {
      font-size: 0.9rem;
      color: #6b7c8c;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #f0f2f5;
    }

    .post-content {
      line-height: 1.7;
      color: #2c3e50;
    }

    .post-content p {
      margin-bottom: 1.2rem;
    }

    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 1rem 0;
    }

    @media (max-width: 700px) {
      .nav-inner {
        flex-direction: column;
        align-items: center;
      }
      .post-title {
        font-size: 2rem;
      }
      .card {
        padding: 1.5rem;
      }
    }
  </style>
</head>

<body data-page="post">

<header class="topbar">
  <div class="nav-inner">
    <a class="brand" href="../../../../index.html">Sai (Emily) Peng</a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="../../../../index.html" data-page="home">Home</a>
      <a href="../../../../publications.html" data-page="publications">Publications</a>
      <a href="../../../../awards.html" data-page="awards">Awards</a>
      <a href="../../../../service.html" data-page="service">Service</a>
      <a href="../../../../blogs.html" data-page="blogs" class="active">Blogs</a>
    </nav>
  </div>
</header>

<main class="layout">
  <section class="content">
    <div class="card">
      <p class="kicker">blog post</p>
      <h1 class="post-title">新年快乐！</h1>
      <div class="post-meta">
        Published on January 28, 2025 • Category: life
      </div>
      <div class="post-content">
        <p>新年快乐！2025一切顺利！</p>
        <div style="text-align: center;">
          <img src="../../../../img/blogs/10_happy_new_year/happy.png" alt="妈妈做的年夜饭。" style="max-width: 100%; height: auto;">
        </div>
      </div>
    </div>
  </section>
</main>

<script>
  // Active navigation highlight
  (function() {
    const currentPage = 'blogs';
    const navLinks = document.querySelectorAll('.nav-links a');
    navLinks.forEach(link => {
      const href = link.getAttribute('href');
      if (href === 'blogs.html' || (href && href.includes('blogs'))) {
        link.classList.add('active');
      }
      if (link.getAttribute('data-page') === currentPage) {
        link.classList.add('active');
      }
    });
  })();
</script>

</body>
</html>
